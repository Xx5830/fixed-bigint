name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cxx: g++
          - os: ubuntu-latest
            compiler: clang
            cxx: clang++
          - os: windows-latest
            compiler: msvc
            cxx: cl

    steps:
    - uses: actions/checkout@v3

    - name: Configure CMake
      env:
        CXX: ${{ matrix.cxx }}
      run: cmake -B build -S . -DFIXED_BIGINT_BUILD_TESTS=ON -DFIXED_BIGINT_BUILD_EXAMPLES=ON

    - name: Build
      run: cmake --build build --config Release -j 2

    - name: Run Tests
      working-directory: build
      run: ctest -C Release --output-on-failure